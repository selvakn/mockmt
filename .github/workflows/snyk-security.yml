name: Snyk Security

on:
  push:
    branches: ["main" ]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Snyk CLI to check for security issues
        uses: snyk/actions/setup@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test
        run: snyk code test --sarif > snyk-code.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build a Docker image
        run: docker build -t app:latest .

      - name: Run Snyk Container scan
        run: snyk container test app:latest --file=Dockerfile --sarif-file-output=snyk-container.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Snyk container SARIF can include rules with a missing or
      # non-numeric `security-severity`, which GitHub Code Scanning
      # rejects. Coerce any missing/null/non-numeric value to "0".
      - name: Sanitize Snyk Container SARIF
        run: |
          if [ ! -s snyk-container.sarif ]; then
            echo "snyk-container.sarif is empty or missing — skipping sanitize."
            exit 0
          fi
          echo "=== Unique security-severity values before sanitize ==="
          jq -r '[.. | objects | select(has("security-severity")) | ."security-severity"] | unique | .[]' snyk-container.sarif || true
          jq '
            def fix_sev:
              if . == null then "0"
              elif type == "string" and (test("^[0-9]+(\\.[0-9]+)?$")) then .
              elif type == "number" then (. | tostring)
              else "0" end;
            walk(
              if type == "object" and (.id? and .shortDescription?) then
                .properties = ((.properties // {}) | ."security-severity" |= fix_sev)
              else . end
            )
          ' snyk-container.sarif > snyk-container.sarif.tmp
          mv snyk-container.sarif.tmp snyk-container.sarif
          echo "=== Unique security-severity values after sanitize ==="
          jq -r '[.. | objects | select(has("security-severity")) | ."security-severity"] | unique | .[]' snyk-container.sarif || true
          jq -e . snyk-container.sarif > /dev/null

      - name: Upload sanitized SARIF as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-container-sarif
          path: snyk-container.sarif
          if-no-files-found: ignore

      - name: Upload Snyk Container results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container
