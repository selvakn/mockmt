name: Snyk Security

on:
  push:
    branches: ["main" ]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Snyk CLI to check for security issues
        uses: snyk/actions/setup@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test
        run: snyk code test --sarif > snyk-code.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build a Docker image
        run: docker build -t app:latest .

      - name: Run Snyk Container scan
        run: snyk container test app:latest --file=Dockerfile --sarif-file-output=snyk-container.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Snyk container SARIF can include rules with a null `security-severity`,
      # which GitHub Code Scanning rejects. Replace those nulls with "0"
      # using sed (robust to arbitrary SARIF nesting), then sanity-check.
      - name: Sanitize Snyk Container SARIF
        run: |
          if [ ! -s snyk-container.sarif ]; then
            echo "snyk-container.sarif is empty or missing — skipping sanitize."
            exit 0
          fi
          before=$(grep -c '"security-severity": *null' snyk-container.sarif || true)
          sed -i 's/"security-severity": *null/"security-severity": "0"/g' snyk-container.sarif
          after=$(grep -c '"security-severity": *null' snyk-container.sarif || true)
          echo "Replaced null security-severity values: before=$before after=$after"
          # Verify file is still valid JSON
          jq -e . snyk-container.sarif > /dev/null

      - name: Upload Snyk Container results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
          category: snyk-container
